
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Наша команда</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <style>
        /* ===== RESET & BASE ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #e6f0f5;
            --bg-card: #ffffff;
            --primary: #3d8fc7;
            --primary-light: #6bb5e0;
            --primary-dark: #2a6f9e;
            --secondary: #40b8a8;
            --secondary-light: #7ed4c7;
            --accent: #f6a26b;
            --accent-light: #fac99e;
            --accent-dark: #e07c44;
            --text-primary: #1a2e3f;
            --text-secondary: #3a5a70;
            --text-light: #6a8ba0;
            --shadow: 0 8px 30px rgba(61, 143, 199, 0.12);
            --shadow-hover: 0 16px 48px rgba(61, 143, 199, 0.22);
            --radius: 20px;
            --radius-sm: 12px;
            --transition: 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            padding: 2rem 1.5rem 4rem;
            background-image:
                radial-gradient(ellipse at 10% 20%, rgba(64, 184, 168, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 90% 80%, rgba(61, 143, 199, 0.10) 0%, transparent 60%);
        }

        /* ===== CONTAINER ===== */
        .container {
            max-width: 1360px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            padding: 2.5rem 0 3.5rem;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 4px;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--primary));
            opacity: 0.35;
        }

        .header__badge {
            display: inline-block;
            background: rgba(64, 184, 168, 0.15);
            color: var(--secondary);
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.35rem 1.2rem;
            border-radius: 100px;
            margin-bottom: 1rem;
            border: 1px solid rgba(64, 184, 168, 0.20);
        }

        .header__title {
            font-size: clamp(2.6rem, 8vw, 4.8rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary), var(--secondary), var(--secondary-light));
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 6s ease-in-out infinite alternate;
            padding: 0 0.5rem;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .header__subtitle {
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: var(--text-secondary);
            font-weight: 400;
            margin-top: 0.75rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0.85;
        }

        /* ===== SECTION TITLES ===== */
        .section-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-primary);
            margin: 3.5rem 0 1.75rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-title .icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary-light), var(--secondary-light));
            color: white;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .section-title .count {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-light);
            margin-left: 0.25rem;
        }

        /* ===== EMPLOYEE CARDS GRID ===== */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.75rem;
        }

        /* ===== EMPLOYEE CARD ===== */
        .employee-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 1.75rem 1.75rem 1.5rem;
            box-shadow: var(--shadow);
            transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
            border: 1px solid rgba(61, 143, 199, 0.06);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .employee-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--primary-light));
            opacity: 0;
            transition: opacity var(--transition);
        }

        .employee-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-hover);
            border-color: rgba(61, 143, 199, 0.12);
        }

        .employee-card:hover::before {
            opacity: 1;
        }

        /* Card header */
        .card__header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        .card__avatar {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--primary-light), var(--secondary-light));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.3rem;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(61, 143, 199, 0.20);
            transition: transform var(--transition);
        }

        .employee-card:hover .card__avatar {
            transform: scale(1.04) rotate(-2deg);
        }

        .card__name {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .card__name .initial {
            color: var(--secondary);
            font-weight: 600;
        }

        /* Card body - branches */
        .card__branches {
            display: flex;
            flex-direction: column;
            gap: 1.1rem;
            flex: 1;
        }

        .branch-group {
            background: rgba(61, 143, 199, 0.04);
            border-radius: var(--radius-sm);
            padding: 0.9rem 1rem 0.7rem;
            border-left: 3px solid var(--primary-light);
            transition: background var(--transition), border-color var(--transition);
        }

        .employee-card:hover .branch-group {
            background: rgba(61, 143, 199, 0.07);
        }

        .branch-group__name {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--primary-dark);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 0.45rem;
            display: inline-block;
            background: rgba(61, 143, 199, 0.10);
            padding: 0.1rem 0.8rem;
            border-radius: 100px;
            font-size: 0.72rem;
        }

        .branch-group__districts {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem 0.6rem;
        }

        .district-item {
            font-size: 0.88rem;
            color: var(--text-secondary);
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            background: white;
            padding: 0.15rem 0.6rem 0.15rem 0.5rem;
            border-radius: 100px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(61, 143, 199, 0.06);
            transition: all var(--transition);
        }

        .employee-card:hover .district-item {
            border-color: rgba(61, 143, 199, 0.12);
        }

        .district-item .highlight {
            font-weight: 700;
            color: var(--accent-dark);
            background: rgba(246, 162, 107, 0.15);
            padding: 0 0.3rem;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .district-item .highlight-letter {
            font-weight: 700;
            color: var(--accent-dark);
            background: rgba(246, 162, 107, 0.18);
            padding: 0 0.35rem;
            border-radius: 4px;
            font-size: 0.8rem;
            display: inline-block;
        }

        .district-item .branch-accent {
            font-weight: 600;
            color: var(--primary);
            background: rgba(61, 143, 199, 0.08);
            padding: 0 0.3rem;
            border-radius: 4px;
        }

        /* ===== INDIVIDUAL ADDRESSES ===== */
        .addresses-section {
            margin-top: 2rem;
        }

        .addresses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.9rem;
        }

        .address-item {
            background: var(--bg-card);
            padding: 0.9rem 1.2rem;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow);
            border: 1px solid rgba(61, 143, 199, 0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            transition: all var(--transition);
            font-size: 0.92rem;
        }

        .address-item:hover {
            transform: translateX(4px) translateY(-2px);
            box-shadow: var(--shadow-hover);
            border-color: rgba(61, 143, 199, 0.12);
        }

        .address-item .addr {
            font-weight: 500;
            color: var(--text-primary);
        }

        .address-item .addr .highlight {
            color: var(--primary-dark);
            font-weight: 600;
        }

        .address-item .assignee {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--secondary);
            background: rgba(64, 184, 168, 0.10);
            padding: 0.15rem 0.8rem;
            border-radius: 100px;
            white-space: nowrap;
            border: 1px solid rgba(64, 184, 168, 0.12);
        }

        /* ===== FLOATING BUBBLES (tasks) ===== */
        .bubbles-section {
            margin-top: 2rem;
        }

        .bubbles-container {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem 1.2rem;
            padding: 0.5rem 0 0.5rem;
        }

        .task-bubble {
            background: var(--bg-card);
            padding: 0.7rem 1.4rem 0.7rem 1.2rem;
            border-radius: 100px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(61, 143, 199, 0.06);
            display: inline-flex;
            align-items: center;
            gap: 0.7rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all var(--transition);
            cursor: default;
            position: relative;
            animation: floatBubble 4s ease-in-out infinite alternate;
        }

        .task-bubble:nth-child(odd) {
            animation-delay: 0.2s;
        }
        .task-bubble:nth-child(3n) {
            animation-delay: 0.8s;
        }
        .task-bubble:nth-child(4n) {
            animation-delay: 1.4s;
        }
        .task-bubble:nth-child(5n) {
            animation-delay: 0.5s;
        }

        @keyframes floatBubble {
            0% {
                transform: translateY(0px);
            }
            100% {
                transform: translateY(-6px);
            }
        }

        .task-bubble:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: var(--shadow-hover);
            border-color: rgba(64, 184, 168, 0.20);
            animation-play-state: paused;
        }

        .task-bubble .task-name {
            color: var(--text-primary);
            font-weight: 500;
        }

        .task-bubble .task-assignee {
            font-weight: 700;
            color: var(--secondary);
            background: rgba(64, 184, 168, 0.10);
            padding: 0.1rem 0.7rem;
            border-radius: 100px;
            font-size: 0.75rem;
            border: 1px solid rgba(64, 184, 168, 0.10);
        }

        .task-bubble .task-emoji {
            font-size: 1rem;
            opacity: 0.7;
        }

        /* Color variants for bubbles */
        .task-bubble[data-color="0"] {
            border-left: 3px solid var(--primary);
        }
        .task-bubble[data-color="1"] {
            border-left: 3px solid var(--secondary);
        }
        .task-bubble[data-color="2"] {
            border-left: 3px solid var(--accent);
        }
        .task-bubble[data-color="3"] {
            border-left: 3px solid var(--primary-light);
        }
        .task-bubble[data-color="4"] {
            border-left: 3px solid var(--secondary-light);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            body {
                padding: 1.25rem 0.9rem 2.5rem;
            }

            .header {
                padding: 1.5rem 0 2.5rem;
            }

            .header__title {
                font-size: clamp(2rem, 10vw, 3rem);
            }

            .cards-grid {
                grid-template-columns: 1fr;
                gap: 1.25rem;
            }

            .employee-card {
                padding: 1.25rem 1.25rem 1.25rem;
            }

            .card__header {
                gap: 0.7rem;
            }
            .card__avatar {
                width: 44px;
                height: 44px;
                font-size: 1rem;
                border-radius: 14px;
            }
            .card__name {
                font-size: 1.1rem;
            }

            .branch-group {
                padding: 0.7rem 0.8rem 0.5rem;
            }
            .branch-group__name {
                font-size: 0.68rem;
            }
            .district-item {
                font-size: 0.8rem;
                padding: 0.1rem 0.5rem 0.1rem 0.4rem;
            }

            .addresses-grid {
                grid-template-columns: 1fr;
                gap: 0.6rem;
            }
            .address-item {
                padding: 0.7rem 0.9rem;
                font-size: 0.85rem;
                flex-wrap: wrap;
            }
            .address-item .assignee {
                font-size: 0.7rem;
            }

            .bubbles-container {
                gap: 0.7rem;
            }
            .task-bubble {
                padding: 0.5rem 1rem 0.5rem 0.9rem;
                font-size: 0.78rem;
                border-radius: 60px;
                animation: none;
            }
            .task-bubble:hover {
                animation: none;
                transform: translateY(-4px);
            }

            .section-title {
                font-size: 1.3rem;
                margin: 2.5rem 0 1.25rem;
            }
            .section-title .icon {
                width: 34px;
                height: 34px;
                font-size: 1rem;
                border-radius: 10px;
            }
        }

        @media (max-width: 480px) {
            .task-bubble {
                width: 100%;
                justify-content: center;
                border-radius: 50px;
            }
            .address-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.3rem;
            }
            .address-item .assignee {
                align-self: flex-start;
            }
            .branch-group__districts {
                gap: 0.3rem 0.4rem;
            }
        }

        /* ===== UTILITY ===== */
        .mt-1 {
            margin-top: 0.5rem;
        }
        .text-center {
            text-align: center;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary-light);
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ===== HEADER ===== -->
        <header class="header">
            <div class="header__badge">✦ Наша команда</div>
            <h1 class="header__title">Распределение районов</h1>
            <p class="header__subtitle">
                Сотрудники и закреплённые за ними территории &bull; Филиалы &bull; Участки
            </p>
        </header>

        <!-- ===== EMPLOYEE CARDS ===== -->
        <div class="section-title">
            <span class="icon">👥</span>
            Сотрудники
            <span class="count">(6)</span>
        </div>
        <div class="cards-grid" id="cardsGrid"></div>

        <!-- ===== INDIVIDUAL ADDRESSES ===== -->
        <div class="section-title addresses-section">
            <span class="icon">📍</span>
            Отдельные адреса
            <span class="count">(7)</span>
        </div>
        <div class="addresses-grid" id="addressesGrid"></div>

        <!-- ===== FLOATING BUBBLES (tasks) ===== -->
        <div class="section-title bubbles-section">
            <span class="icon">🌀</span>
            Дополнительные задачи
            <span class="count">(9)</span>
        </div>
        <div class="bubbles-container" id="bubblesContainer"></div>

    </div>

    <script>
        // ============================================================
        //  DATA
        // ============================================================

        const employees = [{
            name: 'Анна',
            branches: [{
                name: 'Кольский филиал',
                districts: ['г. Апатиты']
            }, {
                name: 'Невский филиал',
                districts: [
                    'Фрунзенский р-н улицы на букву <span class="highlight-letter">А-Д</span>',
                    'Центральный р-н'
                ]
            }]
        }, {
            name: 'Софья',
            branches: [{
                name: 'Карельский филиал',
                districts: ['г. Петрозаводск улицы на букву <span class="highlight-letter">А-Л</span>']
            }, {
                name: 'Невский филиал',
                districts: ['Василеостровский р-н', 'Выборгский р-н']
            }]
        }, {
            name: 'Надежда',
            branches: [{
                name: 'Кольский филиал',
                districts: ['г. Кировск', 'п. Раякоски']
            }, {
                name: 'Невский филиал',
                districts: ['Адмиралтейский р-н', 'Калининский р-н', 'Красногвардейский р-н']
            }]
        }, {
            name: 'Юлия С.',
            branches: [{
                name: 'Карельский филиал',
                districts: ['г. Петрозаводск улицы на букву <span class="highlight-letter">М-С</span>']
            }, {
                name: 'Невский филиал',
                districts: [
                    'Московский р-н',
                    'Фрунзенский р-н улицы на букву <span class="highlight-letter">З-Я</span>'
                ]
            }]
        }, {
            name: 'Валерия',
            branches: [{
                name: 'Карельский филиал',
                districts: ['г. Петрозаводск улицы на букву <span class="highlight-letter">Т-Щ</span>']
            }, {
                name: 'Невский филиал',
                districts: ['Невский р-н', 'Кировский р-н']
            }]
        }, {
            name: 'Елена',
            branches: [{
                name: 'Невский филиал',
                districts: ['Ленинградская область', 'Красносельский р-н']
            }]
        }];

        const addresses = [
            { addr: 'ул. Кирочная, д. 64', assignee: 'Юлия М.' },
            { addr: 'пр. Маршала Блюхера, д.9, корп.1', assignee: 'Валерия' },
            { addr: 'пр. Юрия Гагарина, д. 77', assignee: 'Елена' },
            { addr: 'ул. Парфёновская, д. 17', assignee: 'Юлия С.' },
            { addr: 'ул. Львовская, д. 9', assignee: 'Надежда' },
            { addr: '26-я линия В.О.', assignee: 'Софья' },
            { addr: 'пр. Дунайский, д. 34/16', assignee: 'Елена' }
        ];

        const tasks = [
            { task: 'Функционал рассылки ОДН', assignee: 'Надежда' },
            { task: 'Отправка рассылки ОДН Невский филиал', assignee: 'Надежда' },
            { task: 'Отправка рассылки ОДН Карельский филиал', assignee: 'Валерия' },
            { task: 'Отправка рассылки ОДН Кольский филиал', assignee: 'Анна' },
            { task: 'Перерасчет перерасчетов Невский филиал', assignee: 'Надежда' },
            { task: 'Перерасчет перерасчетов Карельский филиал', assignee: 'Валерия' },
            { task: 'Перерасчет перерасчетов Кольский филиал', assignee: 'Анна' },
            { task: 'Перечень информации по перерасчетам для квитанции', assignee: 'Софья' },
            { task: 'Справка в Клиентское управление по результатам расчета', assignee: 'Софья' }
        ];

        // ============================================================
        //  RENDER
        // ============================================================

        const emojis = ['🌟', '✨', '💫', '🌸', '🌿', '🌊'];

        function renderEmployees() {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = employees.map((emp, idx) => {
                const initial = emp.name.charAt(0);
                const emoji = emojis[idx % emojis.length];

                const branchesHtml = emp.branches.map(b => `
                        <div class="branch-group">
                            <div class="branch-group__name">${b.name}</div>
                            <div class="branch-group__districts">
                                ${b.districts.map(d => `<span class="district-item">${d}</span>`).join('')}
                            </div>
                        </div>
                    `).join('');

                return `
                        <div class="employee-card">
                            <div class="card__header">
                                <div class="card__avatar">${initial}</div>
                                <div class="card__name">
                                    ${emp.name}
                                    <span style="font-size:0.7rem;font-weight:400;color:var(--text-light);margin-left:0.3rem;">${emoji}</span>
                                </div>
                            </div>
                            <div class="card__branches">
                                ${branchesHtml}
                            </div>
                        </div>
                    `;
            }).join('');
        }

        function renderAddresses() {
            const grid = document.getElementById('addressesGrid');
            grid.innerHTML = addresses.map(item => `
                    <div class="address-item">
                        <span class="addr">${item.addr}</span>
                        <span class="assignee">${item.assignee}</span>
                    </div>
                `).join('');
        }

        function renderTasks() {
            const container = document.getElementById('bubblesContainer');
            const colors = ['0', '1', '2', '3', '4'];
            container.innerHTML = tasks.map((t, i) => {
                const colorIdx = i % colors.length;
                return `
                        <div class="task-bubble" data-color="${colors[colorIdx]}">
                            <span class="task-emoji">${['📬','📤','📥','🔄','📋','📊','📈','📑','📌'][i % 9]}</span>
                            <span class="task-name">${t.task}</span>
                            <span class="task-assignee">${t.assignee}</span>
                        </div>
                    `;
            }).join('');
        }

        // ============================================================
        //  INIT
        // ============================================================

        renderEmployees();
        renderAddresses();
        renderTasks();
    </script>
